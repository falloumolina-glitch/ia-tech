<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tech</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f6f7fb;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:white;
  border-bottom:1px solid #eee;
}

button{cursor:pointer}

/* CHAT */
#chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  position:relative;
}

.msg{
  padding:10px;
  border-radius:12px;
  max-width:80%;
}

.user{background:#e5e7eb; align-self:flex-end;}
.bot{background:white; border:1px solid #eee; align-self:flex-start;}

/* WELCOME CENTER */
#welcome{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:#777;
  font-size:16px;
  width:80%;
}

/* INPUT */
.bottom{
  padding:10px;
  background:white;
  border-top:1px solid #eee;
}

.bar{
  display:flex;
  align-items:center;
  gap:8px;
  background:#f1f3f5;
  padding:10px;
  border-radius:25px;
}

input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
}

/* BUTTONS */
.plus{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:white;
  font-size:20px;
}

.send{
  width:36px;
  height:36px;
  border-radius:50%;
  background:black;
  color:white;
  border:none;
}

/* MENU */
.menu{
  position:absolute;
  top:55px;
  background:white;
  border:1px solid #ddd;
  display:none;
  flex-direction:column;
  width:200px;
  z-index:999;
}

.menu button{
  padding:10px;
  border:none;
  background:white;
  text-align:left;
}

img{
  max-width:160px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <button onclick="toggle('leftMenu')">☰</button>
  <b id="title">IA-Tech</b>
  <button onclick="toggle('rightMenu')">⋮</button>
</header>

<!-- MENUS -->
<div class="menu" id="leftMenu">
  <button onclick="newChat()">Nouveau projet</button>
  <button onclick="add('Devoirs activés')">Devoirs</button>
</div>

<div class="menu" id="rightMenu">
  <button onclick="rename()">Renommer</button>
  <button onclick="share()">Partager</button>
  <button onclick="add('Chat archivé')">Archiver</button>
</div>

<div id="chat">
  <div id="welcome">Comment puis-je vous aider aujourd’hui ?</div>
</div>

<!-- INPUT -->
<div class="bottom">

  <div class="bar">

    <button class="plus" onclick="toggle('plusMenu')">+</button>

    <input id="input" placeholder="Message...">

    <button onclick="voice()">🎙</button>

    <button class="send" onclick="send()">➤</button>

  </div>

  <!-- PLUS MENU -->
  <div class="menu" id="plusMenu">
    <button onclick="document.getElementById('photo').click()">Photo</button>
    <button onclick="document.getElementById('camera').click()">Caméra</button>
    <button onclick="document.getElementById('file').click()">Fichier</button>
  </div>

</div>

<!-- FILE INPUT -->
<input type="file" id="photo" accept="image/*" hidden onchange="handleFile(this)">
<input type="file" id="camera" accept="image/*" capture="environment" hidden onchange="handleFile(this)">
<input type="file" id="file" hidden onchange="handleFile(this)">

<script>

/* MENU SAFE */
function toggle(id){
  let el=document.getElementById(id);

  document.querySelectorAll(".menu").forEach(m=>{
    if(m.id!==id) m.style.display="none";
  });

  el.style.display = (el.style.display==="flex")?"none":"flex";
}

/* CLOSE MENU */
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".menu") && !e.target.tagName==="BUTTON"){
    document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
  }
});

/* CHAT */
function add(text,type="bot"){

  document.getElementById("welcome")?.remove();

  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* SEND */
function send(){
  let t=input.value.trim();
  if(!t) return;

  add(t,"user");
  input.value="";

  setTimeout(()=>add("Réponse IA 🤖"),500);
}

/* NEW CHAT */
function newChat(){
  chat.innerHTML=`<div id="welcome">Comment puis-je vous aider aujourd’hui ?</div>`;
}

/* RENAME */
function rename(){
  let n=prompt("Nom du chat ?");
  if(n) document.getElementById("title").innerText=n;
}

/* SHARE */
function share(){
  navigator.clipboard.writeText(location.href);
  alert("Lien copié");
}

/* MICRO */
function voice(){
  let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return alert("Micro non supporté");

  let r=new SR();
  r.lang="fr-FR";
  r.start();

  r.onresult=e=>{
    input.value=e.results[0][0].transcript;
    send();
  };
}

/* FILE */
function handleFile(input){
  let f=input.files[0];
  if(!f) return;

  if(f.type.startsWith("image/")){
    let div=document.createElement("div");
    div.className="msg user";

    let img=document.createElement("img");
    img.src=URL.createObjectURL(f);

    div.appendChild(img);
    chat.appendChild(div);
  }else{
    add("📄 "+f.name,"user");
  }
}

</script>

</body>
  </html>
