<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="title">IA-Tech</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#fff;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #eee;
}

/* BUTTON */
.icon-btn{
  font-size:22px;
  border:none;
  background:none;
  cursor:pointer;
}

/* MENU */
.menu{
  position:absolute;
  top:55px;
  background:white;
  border:1px solid #eee;
  border-radius:12px;
  display:none;
  flex-direction:column;
  width:220px;
  z-index:999;
}

.menu button{
  padding:12px;
  border:none;
  background:white;
  text-align:left;
  cursor:pointer;
}

.menu button:hover{ background:#f3f4f6; }

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:75%;
  padding:12px;
  border-radius:14px;
}

.user{background:#e5e7eb; align-self:flex-end;}
.bot{background:#f9fafb; border:1px solid #eee;}

/* INPUT */
.bottom{
  padding:12px;
  border-top:1px solid #eee;
}

.input-box{
  display:flex;
  gap:8px;
  background:#f3f4f6;
  border-radius:30px;
  padding:10px;
}

.plus{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:white;
  font-size:20px;
}

input{
  flex:1;
  border:none;
  background:transparent;
}

.send{
  background:black;
  color:white;
  border:none;
  border-radius:50%;
  width:36px;
  height:36px;
}
</style>
</head>

<body>

<header>
  <button class="icon-btn" onclick="toggleMenu(event,'leftMenu')">☰</button>
  <b id="chatTitle">IA-Tech</b>
  <button class="icon-btn" onclick="toggleMenu(event,'rightMenu')">⋮</button>
</header>

<!-- LEFT MENU -->
<div class="menu" id="leftMenu">
  <button onclick="newChat()">🆕 Nouveau projet</button>
  <button onclick="add('📚 Mode devoir activé','bot')">📚 Devoirs</button>
</div>

<!-- RIGHT MENU -->
<div class="menu" id="rightMenu">
  <button onclick="renameChat()">✏️ Renommer</button>
  <button onclick="add('📦 Chat archivé','bot')">Archiver</button>
  <button onclick="shareChat()">🔗 Partager</button>
  <button onclick="add('👥 Ajouter participants','bot')">Participants</button>
  <button onclick="add('📌 Chat épinglé','bot')">Épingler</button>
  <button onclick="add('📱 Ajout écran accueil','bot')">Écran accueil</button>
</div>

<div id="chat"></div>

<div class="bottom">
  <div class="input-box">

    <button class="plus" onclick="toggleMenu(event,'plusMenu')">+</button>

    <input id="input" placeholder="Message...">

    <button onclick="startVoice()">🎙</button>

    <button class="send" onclick="send()">➤</button>

  </div>

  <div class="menu" id="plusMenu">
    <button onclick="photo()">📷 Photo</button>
    <button onclick="camera()">📸 Caméra</button>
    <button onclick="file()">📄 Fichier</button>
  </div>
</div>

<input type="file" id="photoInput" accept="image/*" hidden onchange="handleFile(this)">
<input type="file" id="cameraInput" accept="image/*" capture hidden onchange="handleFile(this)">
<input type="file" id="fileInput" hidden onchange="handleFile(this)">

<script>

function toggleMenu(e,id){
  e.stopPropagation();
  document.querySelectorAll(".menu").forEach(m=>{
    if(m.id !== id) m.style.display="none";
  });
  let menu=document.getElementById(id);
  menu.style.display = (menu.style.display==="flex")?"none":"flex";
}

document.addEventListener("click",()=>{
  document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
});

/* CHAT */
function add(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
}

function send(){
  let text=input.value.trim();
  if(!text) return;
  add(text,"user");
  input.value="";
  setTimeout(()=>add("Réponse IA 🤖","bot"),500);
}

/* ACTIONS */
function newChat(){
  chat.innerHTML="";
}

function renameChat(){
  let name=prompt("Nouveau nom ?");
  if(name) document.getElementById("chatTitle").innerText=name;
}

function shareChat(){
  navigator.clipboard.writeText(window.location.href);
  alert("Lien copié !");
}

/* MICRO */
function startVoice(){
  let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return alert("Non supporté");
  let r=new SR();
  r.lang="fr-FR";
  r.start();
  r.onresult=e=>{
    input.value=e.results[0][0].transcript;
    send();
  };
}

/* FILE */
function photo(){ photoInput.click(); }
function camera(){ cameraInput.click(); }
function file(){ fileInput.click(); }

function handleFile(input){
  let f=input.files[0];
  if(!f) return;

  if(f.type.startsWith("image/")){
    let div=document.createElement("div");
    div.className="msg user";
    let img=document.createElement("img");
    img.src=URL.createObjectURL(f);
    img.style.maxWidth="150px";
    div.appendChild(img);
    chat.appendChild(div);
  }else{
    add("📄 "+f.name,"user");
  }
}

</script>

</body>
</html>
