<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA-Tech Ultra</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#020617;
}

#title{font-weight:bold;}

button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
margin:5px 0;
padding:8px;
border-radius:10px;
max-width:75%;
}

.user{background:#06b6d4;align-self:flex-end;}
.bot{background:#1e293b;}

#inputBox{
display:flex;
padding:10px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

#inputBox button{
margin-left:6px;
background:#f97316;
color:white;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.menu{
position:absolute;
top:50px;
right:10px;
background:#1e293b;
border-radius:10px;
display:none;
flex-direction:column;
z-index:10;
}

.menu div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<button onclick="toggleMenu('m1')">☰</button>
<div id="title">IA-Tech Ultra</div>
<div>
<button onclick="newChat()">＋</button>
<button onclick="toggleMenu('m2')">⋮</button>
</div>
</header>

<div id="chat"></div>

<div id="inputBox">
<input id="input" placeholder="Écris un message...">
<button onclick="send()">➤</button>
</div>

<!-- MENUS -->
<div id="m1" class="menu">
<div onclick="alert('Accueil')">Accueil</div>
<div onclick="alert('Paramètres')">Paramètres</div>
</div>

<div id="m2" class="menu">
<div onclick="rename()">Renommer</div>
<div onclick="share()">Partager</div>
</div>

<script>

let chat=document.getElementById("chat");
let input=document.getElementById("input");
let title=document.getElementById("title");

/* 🧠 MÉMOIRE UTILISATEUR */
let memory = JSON.parse(localStorage.getItem("memory")) || {
name:"",
topic:""
};

/* 🧠 IA INTELLIGENTE */
function brain(t){
t=t.toLowerCase();

/* mémoire */
if(memory.name && t.includes("je m'appelle")){
let name=t.split("je m'appelle")[1].trim();
memory.name=name;
saveMemory();
return "Enchanté "+name+" 😊";
}

if(t.includes("bonjour")){
return memory.name ? "Bonjour "+memory.name+" 👋" : "Bonjour 👋";
}

if(t.includes("ça va")){
return "Oui très bien 😊 et toi ?";
}

if(t.includes("comment vas tu")){
return "Je vais très bien merci 😊";
}

if(t.includes("cv")){
return "CV = Curriculum Vitae 📄";
}

/* traduction simple */
if(t.startsWith("traduire")){
let word=t.replace("traduire","").trim();
return word+" → (anglais) "+word;
}

if(t.includes("merci")){
return "Avec plaisir 😊";
}

return "Je comprends 👍 mais j'apprends encore.";
}

/* ADD MESSAGE */
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
saveChat();
}

/* SEND */
function send(){
let t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

setTimeout(()=>add(brain(t),"bot"),400);
}

/* SAVE CHAT */
function saveChat(){
localStorage.setItem("chat",chat.innerHTML);
}

/* LOAD CHAT */
window.onload=function(){
let c=localStorage.getItem("chat");
if(c)chat.innerHTML=c;
}

/* SAVE MEMORY */
function saveMemory(){
localStorage.setItem("memory",JSON.stringify(memory));
}

/* NEW CHAT */
function newChat(){
chat.innerHTML="";
localStorage.removeItem("chat");
}

/* SHARE */
function share(){
if(navigator.share){
navigator.share({title:"IA-Tech",url:location.href});
}else{
navigator.clipboard.writeText(location.href);
alert("Lien copié");
}
}

/* RENAME */
function rename(){
let n=prompt("Nom ?");
if(n)title.innerText=n;
}

/* MENUS */
function toggleMenu(id){
let m=document.getElementById(id);
m.style.display=(m.style.display==="flex")?"none":"flex";
}

/* CLICK OUTSIDE */
document.addEventListener("click",e=>{
document.querySelectorAll(".menu").forEach(m=>{
if(!e.target.closest("button") && !m.contains(e.target)){
m.style.display="none";
}
});
});

</script>

</body>
</html>
