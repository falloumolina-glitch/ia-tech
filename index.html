<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tech</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  background:#0f172a;
  color:white;
  padding:14px;
  text-align:center;
  font-weight:600;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:12px;
  border-radius:16px;
  word-wrap:break-word;
}

.user{
  background:#f4a261;
  color:white;
  align-self:flex-end;
}

.bot{
  background:#1f2937;
  color:white;
  align-self:flex-start;
}

.bottom{
  display:flex;
  gap:8px;
  padding:10px;
  background:#0f172a;
}

.box{
  flex:1;
  display:flex;
  background:#111827;
  border-radius:12px;
  padding:6px;
}

input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  color:white;
  padding:10px;
}

button{
  border:none;
  cursor:pointer;
}

.send{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#f4a261;
  color:white;
}

.mic{
  background:transparent;
  color:white;
}

.plus{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#1f2937;
  color:white;
}
</style>

</head>

<body>

<header>🤖 IA-Tech</header>

<div id="chat"></div>

<div class="bottom">

  <button class="plus" onclick="alert('📎 bientôt disponible')">+</button>

  <div class="box">
    <button class="mic" onclick="startVoice()">🎤</button>
    <input id="input" placeholder="Écris ou parle...">
  </div>

  <button class="send" onclick="send()">➤</button>

</div>

<script>

// 💬 afficher message
function add(text,type){
  let div=document.createElement("div");
  div.classList.add("msg",type);
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=999999;
}

// 🧠 IA SIMPLE (sans API)
function ai(text){

  text=text.toLowerCase();

  if(text.includes("bonjour")) return "Salut 👋 comment puis-je t’aider ?";
  if(text.includes("dissertation")) return "Une dissertation est un texte structuré : intro, développement, conclusion.";
  if(text.includes("ia")) return "Je suis IA-Tech 🤖 ton assistant.";

  return "Je comprends 👍 mais je dois encore apprendre cette réponse.";
}

// 🚀 envoyer message
function send(){

  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  setTimeout(()=>{
    add(ai(text),"bot");
  },500);
}

// 🎙️ micro vocal
function startVoice(){

  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Micro non supporté");
    return;
  }

  let recognition = new SpeechRecognition();
  recognition.lang="fr-FR";
  recognition.start();

  recognition.onresult=function(event){
    let text=event.results[0][0].transcript;
    document.getElementById("input").value=text;
    send();
  };
}

</script>

</body>
</html>
