<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tech Hybrid</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f6f7fb;
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:white;
  border-bottom:1px solid #eee;
}

#chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  position:relative;
}

.msg{
  padding:10px;
  border-radius:12px;
  max-width:80%;
}

.user{background:#e5e7eb; align-self:flex-end;}
.bot{background:white;border:1px solid #eee;align-self:flex-start;}

#welcome{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:#777;
  text-align:center;
  width:80%;
}

.bottom{
  padding:10px;
  background:white;
  border-top:1px solid #eee;
}

.bar{
  display:flex;
  gap:8px;
  align-items:center;
  background:#f1f3f5;
  padding:10px;
  border-radius:25px;
}

input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
}

.plus{
  width:42px;
  height:42px;
  border-radius:50%;
  border:none;
  background:white;
  font-size:20px;
}

.send{
  width:38px;
  height:38px;
  border-radius:50%;
  border:none;
  background:black;
  color:white;
}

.menu{
  position:absolute;
  top:55px;
  background:white;
  border:1px solid #ddd;
  display:none;
  flex-direction:column;
  width:200px;
  z-index:999;
}

.menu button{
  padding:10px;
  border:none;
  background:white;
  text-align:left;
}

img{
  max-width:160px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <button onclick="toggle('left')">☰</button>
  <b id="title">IA-Tech</b>
  <button onclick="toggle('right')">⋮</button>
</header>

<div class="menu" id="left">
  <button onclick="newChat()">Nouveau projet</button>
  <button onclick="alert('Devoirs activés')">Devoirs</button>
</div>

<div class="menu" id="right">
  <button onclick="rename()">Renommer</button>
  <button onclick="share()">Partager</button>
</div>

<div id="chat">
  <div id="welcome">Comment puis-je vous aider aujourd’hui ?</div>
</div>

<div class="bottom">
  <div class="bar">

    <button class="plus" onclick="toggle('plusMenu')">+</button>

    <input id="input" placeholder="Message...">

    <button onclick="voice()">🎙</button>

    <button class="send" onclick="send()">➤</button>

  </div>

  <div class="menu" id="plusMenu">
    <button onclick="document.getElementById('photo').click()">Photo</button>
    <button onclick="document.getElementById('camera').click()">Caméra</button>
    <button onclick="document.getElementById('file').click()">Fichier</button>
  </div>
</div>

<input type="file" id="photo" accept="image/*" hidden onchange="handleFile(this)">
<input type="file" id="camera" accept="image/*" capture="environment" hidden onchange="handleFile(this)">
<input type="file" id="file" hidden onchange="handleFile(this)">

<script>

/* =========================
   MÉMOIRE
========================= */
let memory = {lastUser:"",lastBot:"",topic:""};

/* =========================
   NORMALISATION
========================= */
function normalize(t){
  return t.toLowerCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

/* =========================
   BASE DE CONNAISSANCES ULTRA
========================= */

const DB = [
{keys:["france","paris"],answer:"France 🇫🇷 capitale Paris."},
{keys:["senegal","dakar"],answer:"Sénégal 🇸🇳 capitale Dakar."},
{keys:["terre","planete"],answer:"La Terre 🌍 est notre planète."},
{keys:["soleil"],answer:"Le Soleil ☀️ est une étoile."},
{keys:["lune"],answer:"La Lune 🌙 est un satellite naturel."},
{keys:["ia","intelligence artificielle"],answer:"IA 🤖 technologie intelligente."},
{keys:["internet","web"],answer:"Internet 🌐 réseau mondial."},
{keys:["ordinateur"],answer:"Ordinateur 💻 machine de calcul."},
{keys:["gravite"],answer:"La gravité 🌍 attire les objets."},
{keys:["eau"],answer:"L’eau 💧 est essentielle à la vie."},
{keys:["football","foot"],answer:"Football ⚽ sport mondial."},
{keys:["basket"],answer:"Basketball 🏀 sport populaire."},
{keys:["math","calcul"],answer:"Les maths servent à calculer ➗."},
{keys:["univers"],answer:"L’univers est tout ce qui existe ♾️."},
{keys:["galaxie"],answer:"Une galaxie est un ensemble d’étoiles 🌌."},
{keys:["atome"],answer:"Un atome est la plus petite matière ⚛️."},
{keys:["cellule"],answer:"La cellule est l’unité du vivant 🧫."},
{keys:["virus"],answer:"Un virus peut causer des maladies 🦠."},
{keys:["argent"],answer:"L’argent est un moyen d’échange 💵."},
{keys:["loi"],answer:"Une loi est une règle officielle 📜."},
{keys:["climat"],answer:"Le climat décrit le temps sur long terme 🌦️."}
];

/* =========================
   CERVEAU IA
========================= */

function brain(text){

let t = normalize(text);

memory.lastUser = text;

/* recherche */
for(let item of DB){
for(let k of item.keys){
if(t.includes(k)){
memory.topic = k;
memory.lastBot = item.answer;
return item.answer;
}
}
}

/* chat */
if(/bonjour|salut/.test(t))
return "Bonjour 👋 je suis ton IA.";

if(/comment ca va/.test(t))
return "Je vais bien 👍";

if(/qui es tu/.test(t))
return "Je suis une IA hybride intelligente 🤖.";

if(/merci/.test(t))
return "Avec plaisir 😊";

if(t.includes("heure"))
return "Il est " + new Date().toLocaleTimeString();

/* calcul */
if(/[0-9]/.test(t) && /[+\-*/]/.test(t)){
try{
return "Résultat = " + eval(text.replace(/[^0-9+\-*/().]/g,''));
}catch(e){}
}

/* continuité */
if(/continue|et apres/.test(t))
return "Je continue sur : " + (memory.topic || "aucun sujet");

/* fallback */
return "Je comprends 👍 mais je peux apprendre encore plus.";
}

/* =========================
   CHAT
========================= */

function add(text,type){
document.getElementById("welcome")?.remove();

let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;

chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* =========================
   SEND
========================= */

function send(){
let text=input.value.trim();
if(!text)return;

add(text,"user");
input.value="";

setTimeout(()=>add(brain(text),"bot"),300);
}

/* =========================
   NEW CHAT
========================= */

function newChat(){
chat.innerHTML=`<div id="welcome">Comment puis-je vous aider aujourd’hui ?</div>`;
memory={lastUser:"",lastBot:"",topic:""};
}

/* =========================
   MENU
========================= */

function toggle(id){
let el=document.getElementById(id);
document.querySelectorAll(".menu").forEach(m=>{
if(m.id!==id)m.style.display="none";
});
el.style.display=el.style.display==="flex"?"none":"flex";
}

/* =========================
   VOICE
========================= */

function voice(){
let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR)return alert("Micro non supporté");

let r=new SR();
r.lang="fr-FR";
r.start();

r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}

/* =========================
   FILE
========================= */

function handleFile(input){
let f=input.files[0];
if(!f)return;

if(f.type.startsWith("image/")){
let d=document.createElement("div");
d.className="msg user";
let img=document.createElement("img");
img.src=URL.createObjectURL(f);
d.appendChild(img);
chat.appendChild(d);
}else{
add("📄 "+f.name,"user");
}
}

/* =========================
   SHARE + RENAME
========================= */

function share(){
navigator.clipboard.writeText(location.href);
alert("Lien copié");
}

function rename(){
let n=prompt("Nom ?");
if(n)title.innerText=n;
}

</script>

</body>
</html>
