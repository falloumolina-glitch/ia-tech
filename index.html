<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA-Tech</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#020617;
}

#title{
font-weight:bold;
}

button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
margin:5px 0;
padding:8px 10px;
border-radius:10px;
max-width:70%;
}

.user{
background:#06b6d4;
align-self:flex-end;
}

.bot{
background:#1e293b;
}

/* 🔵 BARRE BAS */
#inputBox{
display:flex;
padding:10px;
background:linear-gradient(90deg, #06b6d4, #3b82f6);
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

/* 🟠 BOUTON ENVOI ORANGE */
#inputBox button{
margin-left:8px;
background:#f97316;
color:white;
padding:10px;
border-radius:10px;
font-weight:bold;
box-shadow:0 2px 8px rgba(249,115,22,0.4);
}

#inputBox button:active{
transform:scale(0.95);
}

#menu, #options{
position:absolute;
top:50px;
right:10px;
background:#1e293b;
border-radius:10px;
display:none;
flex-direction:column;
}

#menu div, #options div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<button onclick="toggleMenu()">☰</button>
<div id="title">IA-Tech</div>
<div>
<button onclick="newChat()">＋</button>
<button onclick="toggleOptions()">⋮</button>
</div>
</header>

<div id="chat">
<div id="welcome">Comment puis-je vous aider aujourd’hui ?</div>
</div>

<div id="inputBox">
<input id="input" placeholder="Écris un message...">
<button onclick="send()">➤</button>
</div>

<div id="menu">
<div onclick="alert('Menu')">Accueil</div>
<div onclick="alert('Paramètres')">Paramètres</div>
</div>

<div id="options">
<div onclick="rename()">Renommer</div>
<div onclick="share()">Partager</div>
</div>

<script>

let chat = document.getElementById("chat");
let input = document.getElementById("input");
let title = document.getElementById("title");

function brain(text){
text = text.toLowerCase();

if(text.includes("bonjour")) return "Bonjour 👋";
if(text.includes("ça va")) return "Oui ça va 😊";
if(text.includes("merci")) return "Avec plaisir 😊";

return "Je comprends 👍";
}

function add(text,type){
document.getElementById("welcome")?.remove();

let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;

chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

function send(){
let text=input.value.trim();
if(!text)return;

add(text,"user");
input.value="";

setTimeout(()=>add(brain(text),"bot"),300);
}

function newChat(){
chat.innerHTML=`<div id="welcome">Comment puis-je vous aider aujourd’hui ?</div>`;
}

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display = m.style.display==="flex"?"none":"flex";
}

function toggleOptions(){
let o=document.getElementById("options");
o.style.display = o.style.display==="flex"?"none":"flex";
}

function rename(){
let n=prompt("Nom ?");
if(n)title.innerText=n;
}

function share(){
if(navigator.share){
navigator.share({title:"IA-Tech", url:location.href});
}else{
navigator.clipboard.writeText(location.href);
alert("Lien copié");
}
}

</script>

</body>
  </html>
