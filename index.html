<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tech</title>

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --chat:#f6f6f6;
  --border:#e5e5e5;
}

body.dark{
  --bg:#0f0f10;
  --text:#fff;
  --chat:#1a1a1a;
  --border:#333;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}

/* CHAT */
#chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:80%;
  padding:12px 14px;
  border-radius:14px;
}

.user{
  background:var(--chat);
  align-self:flex-end;
}

.bot{
  border:1px solid var(--border);
  align-self:flex-start;
}

/* INPUT */
.bottom{
  padding:12px;
  border-top:1px solid var(--border);
}

.box{
  display:flex;
  gap:8px;
  background:var(--chat);
  padding:10px;
  border-radius:25px;
}

input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  color:var(--text);
}

button{
  border:none;
  cursor:pointer;
}

.send{
  background:var(--text);
  color:var(--bg);
  border-radius:50%;
  width:36px;
  height:36px;
}
</style>
</head>

<body>

<header>
  <b>IA-Tech</b>
  <button onclick="toggleTheme()">🌓</button>
</header>

<div id="chat">
  <div class="msg bot">Comment puis-je vous aider aujourd’hui ?</div>
</div>

<div class="bottom">
  <div class="box">
    <input id="input" placeholder="Message...">
    <button onclick="send()">➤</button>
  </div>
</div>

<script>

function toggleTheme(){
  document.body.classList.toggle("dark");
}

function add(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* FRONT → BACKEND */
async function send(){
  let text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  add("IA écrit...","bot");

  const res = await fetch("https://TON-SERVEUR.onrender.com/chat",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({message:text})
  });

  const data = await res.json();

  chat.lastChild.innerText = data.reply;
}

</script>

</body>
</html>
