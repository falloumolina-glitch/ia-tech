<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tech</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  background:#111827;
  color:white;
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* CHAT */
#chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg{
  padding:12px;
  border-radius:15px;
  max-width:75%;
  word-wrap:break-word;
}

.user{
  background:#f4a261;
  color:white;
  align-self:flex-end;
}

.bot{
  background:#1f2937;
  color:white;
  align-self:flex-start;
}

/* INPUT */
footer{
  display:flex;
  padding:10px;
  background:#111827;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  margin-left:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#f4a261;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>🤖 IA-Tech</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Écris ton message...">
<button onclick="send()">Envoyer</button>
</footer>

<script>
function add(text, type){
  let div=document.createElement("div");
  div.classList.add("msg",type);
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=999999;
}

function send(){
  let input=document.getElementById("input");
  let text=input.value;
  if(text.trim()=="") return;

  add(text,"user");

  let response="Je suis IA-Tech 🤖.";

  if(text.toLowerCase().includes("bonjour")){
    response="Salut 👋 comment puis-je t’aider ?";
  }
  else if(text.toLowerCase().includes("dissertation")){
    response="Une dissertation est un texte structuré : introduction, développement et conclusion.";
  }

  add(response,"bot");
  input.value="";
}
</script>

</body>
  </html>
