<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tech</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#ffffff;
  height:100vh;
  display:flex;
  flex-direction:column;
  color:#111;
}

/* HEADER */
header{
  padding:14px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid #eaeaea;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGES */
.msg{
  max-width:75%;
  padding:12px 14px;
  border-radius:14px;
  font-size:15px;
  line-height:1.4;
}

.user{
  background:#e8f5e9;
  align-self:flex-end;
}

.bot{
  background:#f5f5f5;
  border:1px solid #e6e6e6;
  align-self:flex-start;
}

/* BARRE */
.bottom{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  border-top:1px solid #eaeaea;
  background:white;
  position:relative;
}

/* BOUTON + */
.plus{
  width:44px;
  height:44px;
  border-radius:50%;
  border:1px solid #ddd;
  background:white;
  font-size:20px;
  cursor:pointer;
}

/* MENU + */
.menu{
  position:absolute;
  bottom:70px;
  left:10px;
  background:white;
  border:1px solid #eaeaea;
  border-radius:12px;
  display:none;
  flex-direction:column;
  width:160px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.menu button{
  padding:10px;
  border:none;
  background:white;
  text-align:left;
  cursor:pointer;
}

.menu button:hover{
  background:#f3f3f3;
}

/* BARRE INPUT */
.box{
  flex:1;
  display:flex;
  align-items:center;
  background:#f3f4f6;
  border-radius:25px;
  padding:6px 10px;
  border:1px solid #e5e5e5;
}

/* INPUT */
input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  font-size:15px;
}

/* VOIX */
.voice-btn{
  width:34px;
  height:34px;
  border:none;
  background:transparent;
  cursor:pointer;
}

/* ENVOYER */
.send{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#111;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>IA-Tech 🤖</header>

<div id="chat"></div>

<div class="bottom">

  <button class="plus" onclick="toggleMenu()">+</button>

  <div class="menu" id="menu">
    <button onclick="alert('📷 Photo ajoutée')">Photo</button>
    <button onclick="alert('📄 Document ajouté')">Document</button>
  </div>

  <div class="box">

    <!-- VOIX -->
    <button class="voice-btn" onclick="startVoice()">🎙</button>

    <input id="input" placeholder="Écris ton message...">

    <!-- ENVOYER -->
    <button class="send" onclick="send()">➤</button>

  </div>

</div>

<script>

// afficher message
function add(text,type){
  let div=document.createElement("div");
  div.classList.add("msg",type);
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=999999;
}

// IA SIMPLE (offline)
function ai(text){

  text=text.toLowerCase();

  if(text.includes("bonjour")) return "Salut 👋 comment puis-je t’aider ?";
  if(text.includes("ia")) return "IA-Tech 🤖 ton assistant.";
  if(text.includes("dissertation")) return "Introduction, développement, conclusion.";

  return "Je réfléchis encore 🤔";
}

// envoyer message
function send(){

  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  setTimeout(()=>{
    add(ai(text),"bot");
  },500);
}

// micro vocal
function startVoice(){

  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Micro non supporté");
    return;
  }

  let recognition = new SpeechRecognition();
  recognition.lang="fr-FR";
  recognition.start();

  recognition.onresult=function(event){
    document.getElementById("input").value = event.results[0][0].transcript;
    send();
  };
}

// menu +
function toggleMenu(){
  let menu=document.getElementById("menu");
  menu.style.display = (menu.style.display==="flex") ? "none" : "flex";
}

</script>

</body>
  </html>
