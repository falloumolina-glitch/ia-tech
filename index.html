<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA-Tech Stable</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#020617;
}

#title{font-weight:bold;}

button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

/* CHAT */
#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

/* MESSAGE */
.msg{
margin:5px 0;
padding:8px;
border-radius:10px;
max-width:75%;
}

.user{background:#06b6d4;align-self:flex-end;}
.bot{background:#1e293b;}

/* CENTRAGE BIENVENUE */
#welcome{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.7;
text-align:center;
font-size:15px;
}

/* INPUT */
#inputBox{
display:flex;
padding:10px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

#inputBox button{
margin-left:6px;
background:#f97316;
color:white;
padding:10px;
border-radius:10px;
font-weight:bold;
}

/* MENUS */
.menu{
position:absolute;
top:50px;
right:10px;
background:#1e293b;
border-radius:10px;
display:none;
flex-direction:column;
z-index:10;
}

.menu div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<button onclick="toggleMenu('m1')">☰</button>
<div id="title">IA-Tech Stable</div>
<div>
<button onclick="newChat()">＋</button>
<button onclick="voice()">🎤</button>
<button onclick="toggleMenu('m2')">⋮</button>
</div>
</header>

<div id="chat">
<div id="welcome">Comment puis-je vous aider aujourd’hui ?</div>
</div>

<div id="inputBox">
<input id="input" placeholder="Écris ou parle...">
<button onclick="send()">➤</button>
</div>

<!-- MENU GAUCHE -->
<div id="m1" class="menu">
<div onclick="home()">Accueil</div>
<div onclick="settings()">Paramètres</div>
<div onclick="newChat()">Nouveau chat</div>
</div>

<!-- MENU DROITE -->
<div id="m2" class="menu">
<div onclick="rename()">Renommer</div>
<div onclick="share()">Partager</div>
</div>

<script>

let chat=document.getElementById("chat");
let input=document.getElementById("input");
let title=document.getElementById("title");
let welcome=document.getElementById("welcome");

/* 🧠 IA AMÉLIORÉE */
function brain(t){
t=t.toLowerCase();

/* salutations */
if(t.includes("bonjour")) return "Bonjour 👋 comment vas-tu ?";
if(t.includes("salut")) return "Salut 😄 heureux de te voir !";
if(t.includes("bonsoir")) return "Bonsoir 🌙 comment ça va ?";
if(t.includes("ça va")) return "Oui très bien 😊 et toi ?";
if(t.includes("comment vas tu")) return "Je vais très bien merci 😊";
if(t.includes("merci")) return "Avec plaisir 😊";
if(t.includes("cv")) return "CV = document qui décrit ton expérience 📄";
if(t.includes("aide")) return "Je peux répondre, parler ou écouter 🎤";

return "Je comprends 👍 mais j’apprends encore.";
}

/* ADD MESSAGE */
function add(text,type){

if(welcome) welcome.remove();

let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;

chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* SEND */
function send(){
let t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

setTimeout(()=>add(brain(t),"bot"),400);
}

/* 🔥 VOIX */
function voice(){
let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice non supporté");
return;
}

let rec=new SpeechRecognition();
rec.lang="fr-FR";
rec.start();

rec.onresult=function(e){
input.value=e.results[0][0].transcript;
send();
};
}

/* NEW CHAT */
function newChat(){
chat.innerHTML=`<div id="welcome">Comment puis-je vous aider aujourd’hui ?</div>`;
}

/* MENUS */
function toggleMenu(id){
let m=document.getElementById(id);
m.style.display=(m.style.display==="flex")?"none":"flex";
}

/* HOME */
function home(){
add("🏠 Retour à l'accueil","bot");
}

/* SETTINGS */
function settings(){
add("⚙️ Paramètres ouverts (version démo)","bot");
}

/* SHARE */
function share(){
if(navigator.share){
navigator.share({title:"IA-Tech",url:location.href});
}else{
navigator.clipboard.writeText(location.href);
alert("Lien copié");
}
}

/* RENAME */
function rename(){
let n=prompt("Nom ?");
if(n)title.innerText=n;
}

/* CLICK OUTSIDE */
document.addEventListener("click",e=>{
document.querySelectorAll(".menu").forEach(m=>{
if(!e.target.closest("button") && !m.contains(e.target)){
m.style.display="none";
}
});
});

</script>

</body>
</html>
