<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tech</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#ffffff;
  height:100vh;
  display:flex;
  flex-direction:column;
  color:#111;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #eee;
  background:white;
}

.icon-btn{
  font-size:20px;
  border:none;
  background:none;
  cursor:pointer;
}

/* MENU */
.menu{
  position:absolute;
  top:55px;
  background:white;
  border:1px solid #eee;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  display:none;
  flex-direction:column;
  width:220px;
  z-index:100;
}

.menu button{
  padding:12px;
  border:none;
  background:white;
  text-align:left;
  cursor:pointer;
}

.menu button:hover{
  background:#f5f5f5;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* MESSAGES STYLE CHATGPT */
.msg{
  max-width:80%;
  padding:14px 16px;
  border-radius:18px;
  font-size:15px;
  line-height:1.5;
}

.user{
  background:#f4f4f5;
  align-self:flex-end;
}

.bot{
  background:white;
  border:1px solid #eee;
  align-self:flex-start;
}

/* TYPING */
.typing{
  font-size:14px;
  opacity:0.6;
}

/* IMAGE */
img{
  max-width:180px;
  border-radius:12px;
}

/* BOTTOM */
.bottom{
  padding:12px;
  border-top:1px solid #eee;
  background:white;
}

/* INPUT BAR STYLE CHATGPT */
.input-container{
  display:flex;
  align-items:center;
  gap:8px;
  background:#f4f4f5;
  border-radius:30px;
  padding:10px 12px;
  border:1px solid #e5e5e5;
}

.plus{
  width:36px;
  height:36px;
  border-radius:50%;
  border:none;
  background:white;
  cursor:pointer;
}

input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  font-size:15px;
}

/* BUTTONS */
.send{
  width:34px;
  height:34px;
  border-radius:50%;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <button class="icon-btn" onclick="toggleMenu('leftMenu')">☰</button>
  <b>IA-Tech</b>
  <button class="icon-btn" onclick="toggleMenu('rightMenu')">⋮</button>
</header>

<!-- MENUS -->
<div class="menu" id="leftMenu">
  <button>Nouveau projet</button>
  <button>Devoirs</button>
</div>

<div class="menu" id="rightMenu">
  <button>Renommer</button>
  <button>Archiver</button>
  <button>Partager</button>
  <button>Participants</button>
  <button>Épingler</button>
  <button>Écran accueil</button>
</div>

<div id="chat"></div>

<div class="bottom">

  <div class="input-container">

    <button class="plus" onclick="toggleMenu('plusMenu')">+</button>

    <input id="input" placeholder="Message IA-Tech...">

    <button onclick="startVoice()">🎙</button>

    <button class="send" onclick="send()">➤</button>

  </div>

  <div class="menu" id="plusMenu">
    <button onclick="openPhoto()">Photo</button>
    <button onclick="openCamera()">Caméra</button>
    <button onclick="openFile()">Fichier</button>
  </div>

</div>

<!-- FILE INPUT -->
<input type="file" id="photoInput" accept="image/*" hidden onchange="handleFile(this)">
<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden onchange="handleFile(this)">
<input type="file" id="fileInput" hidden onchange="handleFile(this)">

<script>

function toggleMenu(id){
  document.querySelectorAll(".menu").forEach(m=>{
    if(m.id !== id) m.style.display="none";
  });

  let menu=document.getElementById(id);
  menu.style.display = (menu.style.display==="flex")?"none":"flex";
}

document.addEventListener("click",(e)=>{
  if(!e.target.closest(".menu") && !e.target.classList.contains("icon-btn") && !e.target.classList.contains("plus")){
    document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
  }
});

function add(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function typing(){
  let div=document.createElement("div");
  div.className="msg bot typing";
  div.id="typing";
  div.innerText="IA écrit...";
  chat.appendChild(div);
}

function removeTyping(){
  let t=document.getElementById("typing");
  if(t) t.remove();
}

function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  typing();

  setTimeout(()=>{
    removeTyping();
    add("Réponse IA 🤖","bot");
  },1000);
}

/* MICRO */
function startVoice(){
  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) return alert("Micro non supporté");

  let r=new SpeechRecognition();
  r.lang="fr-FR";
  r.start();

  r.onresult=(e)=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };
}

/* FILE */
function openPhoto(){ photoInput.click(); }
function openCamera(){ cameraInput.click(); }
function openFile(){ fileInput.click(); }

function handleFile(input){
  let file=input.files[0];
  if(!file) return;

  if(file.type.startsWith("image/")){
    let div=document.createElement("div");
    div.className="msg user";
    let img=document.createElement("img");
    img.src=URL.createObjectURL(file);
    div.appendChild(img);
    chat.appendChild(div);
  }else{
    add("📄 "+file.name,"user");
  }
}

</script>

</body>
  </html>
