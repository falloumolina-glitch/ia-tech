<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>IA-Tech</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

h1 {
  margin-top: 20px;
}

#chat {
  background: white;
  color: black;
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
  padding: 10px;
  border-radius: 10px;
  height: 350px;
  overflow-y: auto;
}

input {
  width: 65%;
  padding: 10px;
}

button {
  padding: 10px;
  background: #f4a261;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🤖 IA-Tech</h1>

<div id="chat"></div>

<input id="userInput" placeholder="Écris ton message...">
<button onclick="send()">Envoyer</button>

<script>
function send() {
  let input = document.getElementById("userInput").value;
  let chat = document.getElementById("chat");

  if(input.trim() === "") return;

  chat.innerHTML += "<p><b>Toi :</b> " + input + "</p>";

  let response = "Je suis IA-Tech 🤖.";

  if(input.toLowerCase().includes("bonjour")) {
    response = "Salut 👋 comment puis-je t’aider ?";
  }

  chat.innerHTML += "<p><b>IA :</b> " + response + "</p>";

  document.getElementById("userInput").value = "";
}
</script>

</body>
  </html>
