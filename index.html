<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA-Tech Pro Max</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#020617;
}

button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
margin:5px 0;
padding:8px;
border-radius:10px;
max-width:75%;
word-break:break-word;
}

.user{background:#06b6d4;align-self:flex-end;}
.bot{background:#1e293b;}

#inputBox{
display:flex;
align-items:center;
padding:10px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
gap:6px;
}

.inputWrap{
flex:1;
display:flex;
align-items:center;
background:white;
border-radius:12px;
padding-right:5px;
}

.inputWrap input{
flex:1;
padding:10px;
border:none;
outline:none;
}

#plusBtn{
background:white;
color:#06b6d4;
padding:10px;
border-radius:10px;
font-weight:bold;
}

#sendBtn{
background:#f97316;
color:white;
padding:10px 14px;
border-radius:12px;
font-weight:bold;
}

.overlay{
position:fixed;
top:0;left:0;right:0;bottom:0;
display:none;
z-index:99;
}

.menu{
position:absolute;
background:#1e293b;
border-radius:10px;
width:220px;
overflow:hidden;
}

.menu div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.panel{
position:fixed;
bottom:-300px;
left:0;
right:0;
background:#0b1220;
border-top:1px solid #333;
padding:10px;
transition:0.3s;
z-index:100;
}

.panel.active{bottom:0;}

.panel div{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

#cameraBox{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:black;
display:none;
flex-direction:column;
z-index:999;
}

video{
flex:1;
width:100%;
object-fit:cover;
}

#captureBtn{
background:#06b6d4;
padding:15px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<button onclick="openMenu('left')">☰</button>
<div>IA-Tech Pro Max</div>
<button onclick="openMenu('right')">⋮</button>
</header>

<div id="chat"></div>

<div id="inputBox">
<button id="plusBtn" onclick="openPanel()">＋</button>

<div class="inputWrap">
<input id="input" placeholder="Écris...">
</div>

<button id="sendBtn" onclick="send()">➤</button>
</div>

<!-- MENU -->
<div id="overlay" class="overlay" onclick="closeMenus()">
<div id="menu" class="menu"></div>
</div>

<!-- PANEL -->
<div id="panel" class="panel">
<div onclick="openCamera()">📷 Caméra LIVE</div>
<div onclick="openGallery()">🖼️ Photo</div>
<div onclick="openFile()">📁 Fichier</div>
<div onclick="closePanel()">Fermer</div>
</div>

<!-- CAMERA -->
<div id="cameraBox">
<video id="video" autoplay></video>
<div id="captureBtn" onclick="takePhoto()">Prendre photo</div>
</div>

<input type="file" id="fileImage" accept="image/*" style="display:none">
<input type="file" id="fileDoc" style="display:none">

<script>
let chat=document.getElementById("chat");
let input=document.getElementById("input");
let overlay=document.getElementById("overlay");
let menu=document.getElementById("menu");
let panel=document.getElementById("panel");
let video=document.getElementById("video");
let cameraBox=document.getElementById("cameraBox");

function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

function send(){
if(!input.value.trim())return;

let message=input.value;
add(message,"user");
input.value="";

/* IA INTÉGRÉE */
setTimeout(()=>{
add(botReply(message),"bot");
},300);
}

function openMenu(type){
overlay.style.display="block";
menu.innerHTML="";

if(type==="left"){
menu.innerHTML=`
<div>Nouveau projet</div>
<div>Devoirs</div>`;
menu.style.left="10px";
menu.style.top="50px";
}

if(type==="right"){
menu.innerHTML=`
<div>Partager</div>
<div>Renommer</div>
<div>Supprimer</div>`;
menu.style.right="10px";
menu.style.top="50px";
}
}

function closeMenus(){
overlay.style.display="none";
}

function openPanel(){panel.classList.add("active");}
function closePanel(){panel.classList.remove("active");}

async function openCamera(){
cameraBox.style.display="flex";
let stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;
}

function takePhoto(){
let canvas=document.createElement("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

let img=document.createElement("img");
img.src=canvas.toDataURL("image/png");
img.style.maxWidth="200px";

add("", "user");
chat.lastChild.appendChild(img);

cameraBox.style.display="none";
}

function openGallery(){document.getElementById("fileImage").click();}
function openFile(){document.getElementById("fileDoc").click();}
</script>

<!-- AI BRAIN -->
<script src="ai.js"></script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
  </html>
