<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tech Pro Max</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#020617;
}

#title{font-weight:bold;}

button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

/* CHAT */
#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
margin:5px 0;
padding:8px;
border-radius:10px;
max-width:75%;
word-break:break-word;
}

.user{background:#06b6d4;align-self:flex-end;}
.bot{background:#1e293b;}

/* BARRE DU BAS BLEUE (IMPORTANT) */
#inputBox{
display:flex;
align-items:center;
padding:10px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
gap:6px;
}

/* INPUT */
.inputWrap{
flex:1;
display:flex;
align-items:center;
background:white;
border-radius:12px;
padding-right:5px;
}

.inputWrap input{
flex:1;
padding:10px;
border:none;
outline:none;
}

/* MICRO SVG */
#micBtn{
width:42px;
height:42px;
border-radius:50%;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
}

#micBtn svg{
width:18px;
height:18px;
fill:#94a3b8;
}

.listening{
background:#06b6d4 !important;
animation:pulse 1s infinite;
}

.listening svg{fill:white;}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

/* PLUS */
#plusBtn{
background:white;
color:#06b6d4;
padding:10px;
border-radius:10px;
font-weight:bold;
}

/* BOUTON ORANGE */
#sendBtn{
background:#f97316;
color:white;
padding:10px 14px;
border-radius:12px;
font-weight:bold;
box-shadow:0 5px 15px rgba(249,115,22,0.4);
}

/* MENU */
.overlay{
position:fixed;
top:0;left:0;right:0;bottom:0;
display:none;
z-index:99;
}

.menu{
position:absolute;
background:#1e293b;
border-radius:10px;
width:220px;
overflow:hidden;
}

.menu div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* PANEL */
.panel{
position:fixed;
bottom:-300px;
left:0;
right:0;
background:#0b1220;
border-top:1px solid #333;
padding:10px;
transition:0.3s;
z-index:100;
}

.panel.active{bottom:0;}

.panel div{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* CAMERA */
#cameraBox{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:black;
display:none;
flex-direction:column;
z-index:999;
}

video{
flex:1;
width:100%;
object-fit:cover;
}

#captureBtn{
background:#06b6d4;
padding:15px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<button onclick="openMenu('left')">☰</button>
<div id="title">IA-Tech Pro</div>
<button onclick="openMenu('right')">⋮</button>
</header>

<div id="chat"></div>

<!-- INPUT -->
<div id="inputBox">

<button id="plusBtn" onclick="openPanel()">＋</button>

<div class="inputWrap">
<input id="input" placeholder="Écris...">

<button id="micBtn" onclick="voiceAI()">
<svg viewBox="0 0 24 24">
<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
<path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
</svg>
</button>

</div>

<button id="sendBtn" onclick="send()">➤</button>

</div>

<!-- MENU -->
<div id="overlay" class="overlay" onclick="closeMenus()">
<div id="menu" class="menu"></div>
</div>

<!-- PANEL -->
<div id="panel" class="panel">
<div onclick="openCamera()">📷 Caméra LIVE</div>
<div onclick="openGallery()">🖼️ Photo</div>
<div onclick="openFile()">📁 Fichier</div>
<div onclick="closePanel()">Fermer</div>
</div>

<!-- CAMERA -->
<div id="cameraBox">
<video id="video" autoplay></video>
<div id="captureBtn" onclick="takePhoto()">Prendre photo</div>
</div>

<input type="file" id="fileImage" accept="image/*">
<input type="file" id="fileDoc">

<script>

let chat=document.getElementById("chat");
let input=document.getElementById("input");
let overlay=document.getElementById("overlay");
let menu=document.getElementById("menu");
let panel=document.getElementById("panel");
let video=document.getElementById("video");
let cameraBox=document.getElementById("cameraBox");

/* CHAT */
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* SEND */
function send(){
if(!input.value.trim())return;

add(input.value,"user");
input.value="";

setTimeout(()=>add("Je comprends 👍","bot"),300);
}

/* MICRO */
function voiceAI(){
let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR)return;

let mic=document.getElementById("micBtn");
mic.classList.add("listening");

let rec=new SR();
rec.lang="fr-FR";
rec.start();

rec.onresult=(e)=>{
input.value=e.results[0][0].transcript;
send();
};

rec.onend=()=>mic.classList.remove("listening");
}

/* MENUS */
function openMenu(type){
overlay.style.display="block";
menu.innerHTML="";

if(type==="left"){
menu.innerHTML=`
<div onclick="newProject()">Nouveau projet</div>
<div onclick="homeworks()">Devoirs</div>`;
menu.style.left="10px";
menu.style.top="50px";
}

if(type==="right"){
menu.innerHTML=`
<div onclick="shareApp()">Partager</div>
<div onclick="renameApp()">Renommer</div>
<div onclick="addProject()">Projet</div>
<div onclick="archiveChat()">Archiver</div>
<div onclick="deleteChat()">Supprimer</div>`;
menu.style.right="10px";
menu.style.top="50px";
}
}

function closeMenus(){
overlay.style.display="none";
}

/* SHARE RÉEL */
function shareApp(){
if(navigator.share){
navigator.share({
title:"IA-Tech Pro",
url:location.href
});
}else{
navigator.clipboard.writeText(location.href);
alert("Lien copié 📋");
}
}

/* ACTIONS */
function newProject(){chat.innerHTML="";}
function homeworks(){add("Devoirs","bot");}
function renameApp(){prompt("Nom ?");}
function addProject(){localStorage.setItem("p",chat.innerHTML);}
function archiveChat(){chat.innerHTML="";}
function deleteChat(){chat.innerHTML="";}

/* PANEL */
function openPanel(){panel.classList.add("active");}
function closePanel(){panel.classList.remove("active");}

/* CAMERA LIVE */
async function openCamera(){
cameraBox.style.display="flex";
let stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;
}

function takePhoto(){
let canvas=document.createElement("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

let img=document.createElement("img");
img.src=canvas.toDataURL("image/png");
img.style.maxWidth="200px";

add("", "user");
chat.lastChild.appendChild(img);

cameraBox.style.display="none";
}

/* FILES */
function openGallery(){document.getElementById("fileImage").click();}
function openFile(){document.getElementById("fileDoc").click();}

</script>

</body>
  </html>
