<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA-Tech Pro Final</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#020617;
}

#title{font-weight:bold;}

button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

/* CHAT */
#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
margin:5px 0;
padding:8px;
border-radius:10px;
max-width:75%;
}

.user{background:#06b6d4;align-self:flex-end;}
.bot{background:#1e293b;}

/* INPUT */
#inputBox{
display:flex;
align-items:center;
padding:10px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
gap:6px;
}

.inputWrap{
flex:1;
display:flex;
align-items:center;
background:white;
border-radius:12px;
padding-right:5px;
}

.inputWrap input{
flex:1;
padding:10px;
border:none;
outline:none;
border-radius:12px;
}

/* MICRO SVG (SANS EMOJI) */
#micBtn{
width:42px;
height:42px;
border-radius:50%;
border:none;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.2s;
}

#micBtn svg{
width:18px;
height:18px;
fill:#94a3b8;
}

#micBtn:active{
transform:scale(0.9);
}

.listening{
background:#06b6d4 !important;
animation:pulse 1s infinite;
}

.listening svg{
fill:white !important;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

/* BUTTONS */
#plusBtn{
background:white;
color:#06b6d4;
padding:10px;
border-radius:10px;
font-weight:bold;
}

#sendBtn{
background:#f97316;
color:white;
padding:10px;
border-radius:10px;
font-weight:bold;
}

/* MENU */
.menu{
position:absolute;
top:50px;
right:10px;
background:#1e293b;
border-radius:10px;
display:none;
flex-direction:column;
z-index:10;
width:240px;
}

.menu div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* PANEL */
.panel{
position:fixed;
bottom:-300px;
left:0;
right:0;
background:#0b1220;
border-top:1px solid #333;
padding:10px;
transition:0.3s;
z-index:100;
}

.panel.active{bottom:0;}

.panel div{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* FILE */
input[type="file"]{
display:none;
}

/* PIN */
#pin{
display:none;
padding:8px;
background:#111827;
font-size:12px;
}
</style>
</head>

<body>

<header>
<button onclick="toggleMenu('m1')">☰</button>
<div id="title">IA-Tech Pro</div>
<button onclick="toggleMenu('m1')">⋮</button>
</header>

<div id="pin"></div>
<div id="chat"></div>

<!-- INPUT -->
<div id="inputBox">

<button id="plusBtn" onclick="openPanel()">＋</button>

<div class="inputWrap">
<input id="input" placeholder="Écris ou parle...">

<button id="micBtn" onclick="voiceAI()">
<svg viewBox="0 0 24 24">
<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
<path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
</svg>
</button>

</div>

<button id="sendBtn" onclick="send()">➤</button>

</div>

<!-- MENU COMPLET -->
<div id="m1" class="menu">

<div onclick="addParticipants()">👥 Ajouter participants</div>
<div onclick="shareApp()">📤 Partager</div>
<div onclick="renameApp()">✏️ Renommer</div>
<div onclick="addProject()">📁 Ajouter au projet</div>
<div onclick="archiveChat()">🗄️ Archiver</div>
<div onclick="pinMessage()">📌 Épingler</div>
<div onclick="addHome()">🏠 Ajouter écran d’accueil</div>
<div onclick="openSettings()">⚙️ Paramètres</div>
<div onclick="deleteChat()">🗑️ Supprimer</div>

</div>

<!-- PANEL -->
<div id="panel" class="panel">
<div onclick="openCamera()">📷 Caméra</div>
<div onclick="openGallery()">🖼️ Photo</div>
<div onclick="openFile()">📁 Fichier</div>
<div onclick="closePanel()">❌ Fermer</div>
</div>

<input type="file" id="fileImage" accept="image/*">
<input type="file" id="fileDoc" accept="*/*">

<script>

let chat=document.getElementById("chat");
let input=document.getElementById("input");
let mic=document.getElementById("micBtn");
let title=document.getElementById("title");
let pin=document.getElementById("pin");

let last="";

/* IA SIMPLE */
function brain(t){
t=t.toLowerCase();
if(t.includes("bonjour")) return "Bonjour 👋";
if(t.includes("ça va")) return "Oui très bien 😊";
if(t.includes("merci")) return "Avec plaisir 😊";
return "Je comprends 👍";
}

/* CHAT */
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
if(type==="bot") last=text;
}

/* SEND */
function send(){
let t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

setTimeout(()=>add(brain(t),"bot"),300);
}

/* MICRO */
function voiceAI(){

let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Micro non supporté");
return;
}

mic.classList.add("listening");

let rec=new SpeechRecognition();
rec.lang="fr-FR";
rec.start();

rec.onresult=function(e){
input.value=e.results[0][0].transcript;
send();
};

rec.onend=function(){
mic.classList.remove("listening");
};
}

/* MENU */
function toggleMenu(id){
let m=document.getElementById(id);
m.style.display=(m.style.display==="flex")?"none":"flex";
}

/* ACTIONS */
function addParticipants(){add("👥 participant ajouté","bot");}
function shareApp(){alert("Lien copié");}
function renameApp(){let n=prompt("Nom ?");if(n)title.innerText=n;}
function addProject(){localStorage.setItem("p",chat.innerHTML);add("📁 projet sauvegardé","bot");}
function archiveChat(){localStorage.setItem("a",chat.innerHTML);chat.innerHTML="";add("🗄️ archivé","bot");}
function pinMessage(){if(last)pin.style.display="block",pin.innerText="📌 "+last;}
function addHome(){alert("Ajout écran accueil");}
function openSettings(){alert("Paramètres ouverts");}
function deleteChat(){chat.innerHTML="";add("🗑️ supprimé","bot");}

/* PANEL */
function openPanel(){panel.classList.add("active");}
function closePanel(){panel.classList.remove("active");}

/* FILE */
function openCamera(){document.getElementById("fileImage").click();}
function openGallery(){document.getElementById("fileImage").click();}
function openFile(){document.getElementById("fileDoc").click();}

</script>

</body>
  </html>
