<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA-Tech Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#020617;
}

#title{font-weight:bold;}

button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

/* CHAT */
#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
margin:5px 0;
padding:8px;
border-radius:10px;
max-width:75%;
}

.user{background:#06b6d4;align-self:flex-end;}
.bot{background:#1e293b;}

/* INPUT BAR */
#inputBox{
display:flex;
align-items:center;
padding:10px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
gap:6px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

/* BTN + */
#plusBtn{
background:white;
color:#06b6d4;
padding:10px;
border-radius:10px;
font-weight:bold;
}

/* VOICE IA */
#voiceBtn{
background:#111827;
color:#06b6d4;
padding:10px;
border-radius:10px;
}

/* SEND */
#sendBtn{
background:#f97316;
color:white;
padding:10px;
border-radius:10px;
font-weight:bold;
}

/* PANEL + */
.panel{
position:fixed;
bottom:-260px;
left:0;
right:0;
background:#0b1220;
border-top:1px solid #333;
padding:10px;
transition:0.3s;
z-index:100;
}

.panel.active{
bottom:0;
}

.panel div{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* MENU */
.menu{
position:absolute;
top:50px;
right:10px;
background:#1e293b;
border-radius:10px;
display:none;
flex-direction:column;
z-index:10;
}

.menu div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* FILE HIDDEN */
input[type="file"]{
display:none;
}
</style>
</head>

<body>

<header>
<button onclick="toggleMenu('m1')">☰</button>
<div id="title">IA-Tech Pro</div>
<div>
<button onclick="toggleMenu('m2')">⋮</button>
</div>
</header>

<div id="chat"></div>

<!-- BARRE -->
<div id="inputBox">

<button id="plusBtn" onclick="openPanel()">＋</button>

<input id="input" placeholder="Écris ou parle...">

<button id="voiceBtn" onclick="voiceAI()">🎙 IA</button>

<button id="sendBtn" onclick="send()">➤</button>

</div>

<!-- PANEL + -->
<div id="panel" class="panel">
<div onclick="openCamera()">📷 Caméra</div>
<div onclick="openGallery()">🖼️ Photo</div>
<div onclick="openFile()">📁 Fichier</div>
<div onclick="closePanel()">❌ Fermer</div>
</div>

<!-- MENUS -->
<div id="m1" class="menu">
<div onclick="home()">Accueil</div>
<div onclick="newChat()">Nouveau chat</div>
</div>

<div id="m2" class="menu">
<div onclick="rename()">Renommer</div>
<div onclick="share()">Partager</div>
</div>

<!-- FILES -->
<input type="file" id="fileImage" accept="image/*">
<input type="file" id="fileDoc" accept="*/*">

<script>

let chat=document.getElementById("chat");
let input=document.getElementById("input");
let panel=document.getElementById("panel");
let title=document.getElementById("title");

/* 🧠 IA */
function brain(t){
t=t.toLowerCase();

if(t.includes("bonjour")) return "Bonjour 👋";
if(t.includes("salut")) return "Salut 😄";
if(t.includes("ça va")) return "Oui très bien 😊";
if(t.includes("comment vas tu")) return "Je vais très bien merci 😊";
if(t.includes("merci")) return "Avec plaisir 😊";
if(t.includes("cv")) return "CV = document professionnel 📄";

return "Je comprends 👍";
}

/* CHAT */
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* SEND */
function send(){
let t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

setTimeout(()=>add(brain(t),"bot"),300);
}

/* VOICE IA */
function voiceAI(){
let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice non supporté");
return;
}

let rec=new SpeechRecognition();
rec.lang="fr-FR";
rec.start();

rec.onstart=()=>add("🎙 J'écoute...","bot");

rec.onresult=function(e){
input.value=e.results[0][0].transcript;
send();
};
}

/* PANEL */
function openPanel(){
panel.classList.add("active");
}

function closePanel(){
panel.classList.remove("active");
}

/* CAMERA */
function openCamera(){
let f=document.getElementById("fileImage");
f.setAttribute("capture","environment");
f.click();
closePanel();
}

/* GALLERY */
function openGallery(){
let f=document.getElementById("fileImage");
f.removeAttribute("capture");
f.click();
closePanel();
}

/* FILE */
function openFile(){
document.getElementById("fileDoc").click();
closePanel();
}

/* IMAGE ADD */
document.getElementById("fileImage").onchange=function(e){
let file=e.target.files[0];
if(!file)return;

let reader=new FileReader();
reader.onload=function(){
let d=document.createElement("div");
d.className="msg user";

let img=document.createElement("img");
img.src=reader.result;
img.style.maxWidth="200px";
img.style.borderRadius="10px";

d.appendChild(img);
chat.appendChild(d);
};
reader.readAsDataURL(file);
};

/* FILE NAME */
document.getElementById("fileDoc").onchange=function(e){
let f=e.target.files[0];
if(!f)return;
add("📁 "+f.name,"user");
};

/* MENUS */
function toggleMenu(id){
let m=document.getElementById(id);
m.style.display=(m.style.display==="flex")?"none":"flex";
}

/* HOME */
function home(){
add("🏠 Accueil","bot");
}

/* NEW CHAT */
function newChat(){
chat.innerHTML="";
}

/* SHARE */
function share(){
if(navigator.share){
navigator.share({title:"IA-Tech",url:location.href});
}else{
navigator.clipboard.writeText(location.href);
alert("Lien copié");
}
}

/* RENAME */
function rename(){
let n=prompt("Nom ?");
if(n)title.innerText=n;
}

</script>

</body>
  </html>
