<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tech</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#fff;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  border-bottom:1px solid #eaeaea;
}

.icon-btn{
  font-size:20px;
  border:none;
  background:none;
  cursor:pointer;
}

/* MENUS */
.menu{
  position:absolute;
  top:55px;
  background:white;
  border:1px solid #eee;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  border-radius:10px;
  display:none;
  flex-direction:column;
  width:220px;
  z-index:20;
}

.menu button{
  padding:10px;
  border:none;
  background:white;
  text-align:left;
  cursor:pointer;
}

.menu button:hover{
  background:#f3f3f3;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:12px;
  border-radius:14px;
}

.user{background:#e8f5e9; align-self:flex-end;}
.bot{background:#f5f5f5; border:1px solid #e6e6e6; align-self:flex-start;}

/* BOTTOM */
.bottom{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  border-top:1px solid #eee;
  position:relative;
}

/* + */
.plus{
  width:44px;
  height:44px;
  border-radius:50%;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
}

/* INPUT */
.box{
  flex:1;
  display:flex;
  align-items:center;
  background:#f3f4f6;
  border-radius:25px;
  padding:6px 8px;
}

input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
}

/* BUTTONS */
.small-btn{
  border:none;
  background:transparent;
  cursor:pointer;
}

.send{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#111;
  color:white;
  border:none;
  cursor:pointer;
}

img{
  max-width:150px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <button class="icon-btn" onclick="toggleLeft()">☰</button>
  <div>IA-Tech 🤖</div>
  <button class="icon-btn" onclick="toggleRight()">⋮</button>
</header>

<!-- MENU GAUCHE -->
<div class="menu" id="leftMenu">
  <button onclick="alert('Nouveau projet')">Nouveau projet</button>
  <button onclick="alert('Devoirs')">Devoirs</button>
</div>

<!-- MENU DROITE -->
<div class="menu" id="rightMenu">
  <button onclick="alert('Renommer')">Renommer</button>
  <button onclick="alert('Archiver')">Archiver</button>
  <button onclick="alert('Partager')">Partager</button>
  <button onclick="alert('Participants')">Ajouter participants</button>
  <button onclick="alert('Épingler')">Épingler</button>
  <button onclick="alert('Écran accueil')">Écran d’accueil</button>
</div>

<div id="chat"></div>

<div class="bottom">

  <!-- + bouton -->
  <button class="plus" onclick="togglePlus()">+</button>

  <!-- MENU + -->
  <div class="menu" id="plusMenu">
    <button onclick="openPhoto()">Photo</button>
    <button onclick="openCamera()">Caméra</button>
    <button onclick="openFile()">Fichier</button>
  </div>

  <div class="box">

    <button class="small-btn" onclick="startVoice()">🎙</button>

    <input id="input" placeholder="Message...">

    <button class="send" onclick="send()">➤</button>

  </div>

</div>

<!-- INPUTS RÉELS -->
<input type="file" id="photoInput" accept="image/*" hidden onchange="handleFile(this)">
<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden onchange="handleFile(this)">
<input type="file" id="fileInput" hidden onchange="handleFile(this)">

<script>

/* MENUS */
function toggleLeft(){
  let m=document.getElementById("leftMenu");
  m.style.display = (m.style.display==="flex")?"none":"flex";
}

function toggleRight(){
  let m=document.getElementById("rightMenu");
  m.style.display = (m.style.display==="flex")?"none":"flex";
}

function togglePlus(){
  let m=document.getElementById("plusMenu");
  m.style.display = (m.style.display==="flex")?"none":"flex";
}

/* fermer menus */
document.addEventListener("click",function(e){
  if(!e.target.classList.contains("icon-btn") && !e.target.classList.contains("plus")){
    document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
  }
});

/* CHAT */
function add(text,type){
  let div=document.createElement("div");
  div.classList.add("msg",type);
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
}

function addImage(src){
  let div=document.createElement("div");
  div.classList.add("msg","user");

  let img=document.createElement("img");
  img.src=src;

  div.appendChild(img);
  document.getElementById("chat").appendChild(div);
}

/* ENVOYER */
function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  setTimeout(()=>{
    add("Je réfléchis 🤔","bot");
  },500);
}

/* MICRO */
function startVoice(){
  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) return alert("Micro non supporté");

  let r = new SpeechRecognition();
  r.lang="fr-FR";
  r.start();

  r.onresult=(e)=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };
}

/* FICHIERS */
function openPhoto(){ document.getElementById("photoInput").click(); }
function openCamera(){ document.getElementById("cameraInput").click(); }
function openFile(){ document.getElementById("fileInput").click(); }

function handleFile(input){
  const file = input.files[0];
  if(!file) return;

  if(file.type.startsWith("image/")){
    const url = URL.createObjectURL(file);
    addImage(url);
  }else{
    add("📄 " + file.name,"user");
  }
}

</script>

</body>
  </html>
